<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --panel: #171717; --text: #d0d0d0; --accent: #BFA46F; --font-main: 'Fira Mono', monospace; }
        body { background-color: var(--bg); margin: 0; padding: 0; overflow: hidden; }
        
        /* ГЕОМЕТРИЯ СТРОГО ПО ЧЕРТЕЖУ */
        .tm-main-container {
            width: 540px; height: 380px; 
            background: var(--panel); border: 1px solid var(--accent); border-radius: 2px;
            overflow: hidden; display: flex; flex-direction: column;
            margin-left: 145px;
        }

        .tm-header { background: var(--accent); padding: 8px 12px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .tm-flag { width: 30px; height: auto; border: 1px solid #fff; }
        .tm-header-text { color: var(--bg); font-size: 13px; font-weight: 700; text-transform: uppercase; font-family: var(--font-main); }
        
        /* ОКНО ДЛЯ ОРИГИНАЛЬНОГО ВИДЖЕТА */
        .tm-iframe-wrapper { flex: 1; width: 100%; border: none; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        .tm-controls { background: var(--panel); padding: 10px 0; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--accent); }
        .tm-btn-row { display: flex; gap: 6px; justify-content: center; }
        .tm-btn { 
            background: var(--panel); border: 1px solid var(--accent); color: var(--accent); 
            padding: 6px 12px; font-family: var(--font-main); font-size: 9px; cursor: pointer; text-transform: uppercase; 
        }
        .tm-btn.active { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<div class="tm-main-container">
    <div class="tm-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Flag_of_Uzbekistan.svg/1280px-Flag_of_Uzbekistan.svg.png" class="tm-flag">
        <div class="tm-header-text">UZBEKISTAN: EXPORT-IMPORT</div>
    </div>

    <div class="tm-iframe-wrapper">
        <iframe id="oec-frame" src=""></iframe>
    </div>

    <div class="tm-controls">
        <div class="tm-btn-row">
            <button id="f-export" class="tm-btn active" onclick="setMode('export')">ЭКСПОРТ</button>
            <button id="f-import" class="tm-btn" onclick="setMode('import')">ИМПОРТ</button>
        </div>
        <div class="tm-btn-row">
            <button id="v-map" class="tm-btn" onclick="setView('map')">КАРТА</button>
            <button id="v-growth" class="tm-btn" onclick="setView('growth')">РАЗВИТИЕ</button>
            <button id="v-composition" class="tm-btn active" onclick="setView('composition')">СОСТАВ</button>
        </div>
    </div>
</div>

<script>
    let currentMode = 'export';
    let currentView = 'composition';

    // ГЕНЕРАТОР ССЫЛОК НА ОРИГИНАЛЬНЫЕ ВИЗУАЛИЗАЦИИ OEC
    // Мы используем формат Embed, который предназначен для вставки
    function getOecUrl() {
        const flow = currentMode === 'export' ? 'export' : 'import';
        
        if (currentView === 'composition') {
            // Виджет Tree Map (Состав)
            return `https://oec.world/en/visualize/embed/tree_map/hs92/${flow}/uzb/all/show/2022/`;
        } else if (currentView === 'growth') {
            // Виджет Stacked (Развитие)
            return `https://oec.world/en/visualize/embed/stacked/hs92/${flow}/uzb/all/show/2012.2022/`;
        } else if (currentView === 'map') {
            // Виджет Geo Map (Карта)
            return `https://oec.world/en/visualize/embed/network/hs92/${flow}/uzb/all/show/2022/`;
        }
    }

    function updateFrame() {
        const frame = document.getElementById('oec-frame');
        const newUrl = getOecUrl();
        if (frame.src !== newUrl) {
            frame.src = newUrl;
        }
    }

    function setMode(m) {
        currentMode = m;
        updateUI();
        updateFrame();
    }

    function setView(v) {
        currentView = v;
        updateUI();
        updateFrame();
    }

    function updateUI() {
        document.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`f-${currentMode}`).classList.add('active');
        document.getElementById(`v-${currentView}`).classList.add('active');
    }

    // Стартовая загрузка
    updateFrame();
</script>

</body>
</html>
