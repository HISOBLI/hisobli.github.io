<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --panel: #171717; --accent: #BFA46F; --font-main: 'Fira Mono', monospace; }
        body { background-color: var(--bg); margin: 0; padding: 0; overflow: hidden; }
        
        .tm-main-container {
            width: 540px; height: 380px; 
            background: var(--panel); border: 1px solid var(--accent); border-radius: 2px;
            display: flex; flex-direction: column; margin-left: 145px;
        }

        .tm-header { background: var(--accent); padding: 8px 12px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .tm-flag { width: 30px; height: auto; border: 1px solid #fff; }
        .tm-header-text { color: var(--bg); font-size: 13px; font-weight: 700; text-transform: uppercase; font-family: var(--font-main); }
        
        /* КОНТЕЙНЕР ДЛЯ ОРИГИНАЛЬНОГО ПЛЕЕРА OEC */
        .tm-viewport { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }

        .tm-controls { background: var(--panel); padding: 10px 0; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--accent); }
        .tm-btn-row { display: flex; gap: 6px; justify-content: center; }
        .tm-btn { 
            background: var(--panel); border: 1px solid var(--accent); color: var(--accent); 
            padding: 6px 12px; font-family: var(--font-main); font-size: 9px; cursor: pointer; text-transform: uppercase; 
        }
        .tm-btn.active { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<div class="tm-main-container">
    <div class="tm-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Flag_of_Uzbekistan.svg/1280px-Flag_of_Uzbekistan.svg.png" class="tm-flag">
        <div class="tm-header-text">UZBEKISTAN: EXPORT-IMPORT</div>
    </div>

    <div class="tm-viewport">
        <iframe id="oec-engine" src=""></iframe>
    </div>

    <div class="tm-controls">
        <div class="tm-btn-row">
            <button id="f-export" class="tm-btn active" onclick="setParam('flow', 'export')">ЭКСПОРТ</button>
            <button id="f-import" class="tm-btn" onclick="setParam('flow', 'import')">ИМПОРТ</button>
        </div>
        <div class="tm-btn-row">
            <button id="v-map" class="tm-btn" onclick="setParam('viz', 'geo_map')">КАРТА</button>
            <button id="v-growth" class="tm-btn" onclick="setParam('viz', 'stacked')">РАЗВИТИЕ</button>
            <button id="v-composition" class="tm-btn active" onclick="setParam('viz', 'tree_map')">СОСТАВ</button>
        </div>
    </div>
</div>

<script>
    let state = {
        flow: 'export',
        viz: 'tree_map',
        year: '2022' // Последний стабильный год в их базе
    };

    function buildUrl() {
        // Использование специального эндпоинта для EMBED (разрешен X-Frame-Options)
        // Формат: /en/visualize/embed/{тип}/{классификатор}/{направление}/{страна}/{партнер}/{продукт}/{год}/
        const baseUrl = "https://oec.world/en/visualize/embed";
        return `${baseUrl}/${state.viz}/hs92/${state.flow}/uzb/all/show/${state.year}/`;
    }

    function refresh() {
        const frame = document.getElementById('oec-engine');
        frame.src = buildUrl();
        
        // Визуальное обновление кнопок
        document.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`f-${state.flow}`).classList.add('active');
        
        // Маппинг ID кнопок визуализации
        const vizId = state.viz === 'tree_map' ? 'composition' : (state.viz === 'stacked' ? 'growth' : 'map');
        document.getElementById(`v-${vizId}`).classList.add('active');
    }

    function setParam(key, val) {
        state[key] = val;
        refresh();
    }

    // Первый запуск
    refresh();
</script>

</body>
</html>
