<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --bg: #121212; --panel: #171717; --accent: #BFA46F; }
        body { background: var(--bg); margin: 0; font-family: 'Fira Mono', monospace; overflow: hidden; }
        .tm-container {
            width: 540px; height: 380px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; background: var(--panel); margin-left: 145px;
        }
        .tm-header { background: var(--accent); color: var(--bg); padding: 7px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1.5px; }
        #canvas { flex: 1; width: 100%; background: #ffffff; }
        .tm-controls { padding: 8px; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--accent); }
        .btn-group { display: flex; gap: 4px; justify-content: center; }
        .btn { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 4px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase;
        }
        .btn.active { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<div class="tm-container">
    <div class="tm-header" id="tm-title">UZBEKISTAN: EXPORT-IMPORT</div>
    <div id="canvas"></div>
    <div class="tm-controls">
        <div class="btn-group">
            <button id="f-export" class="btn active" onclick="setMode('export')">EXPORT</button>
            <button id="f-import" class="btn" onclick="setMode('import')">IMPORT</button>
        </div>
        <div class="btn-group">
            <button id="v-map" class="btn" onclick="setView('map')">MAP</button>
            <button id="v-growth" class="btn" onclick="setView('growth')">GROWTH</button>
            <button id="v-composition" class="btn active" onclick="setView('composition')">COMPOSITION</button>
        </div>
    </div>
</div>

<script>
    const chart = echarts.init(document.getElementById('canvas'));
    let mode = 'export', view = 'composition';
    const OEC_COLORS = ['#ffcc00', '#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#e74c3c', '#1abc9c', '#34495e', '#d35400', '#7f8c8d'];
    
    const apis = {
        'export-composition': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2024%3BExporter%20Country%3Aasuzb',
        'import-composition': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2024%3BImporter%20Country%3Aasuzb',
        'export-growth': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2018%2C2019%2C2020%2C2021%2C2022%2C2023%2C2024%3BExporter%20Country%3Aasuzb',
        'import-growth': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2018%2C2019%2C2020%2C2021%2C2022%2C2023%2C2024%3BImporter%20Country%3Aasuzb',
        'export-map': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CImporter%20Country&measures=Trade%20Value&parents=true&properties=Importer%20Country%20ISO%203&include=Year%3A2024%3BExporter%20Country%3Aasuzb',
        'import-map': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CExporter%20Country&measures=Trade%20Value&parents=true&properties=Exporter%20Country%20ISO%203&include=Year%3A2024%3BImporter%20Country%3Aasuzb'
    };

    const formatVal = (v) => {
        if (!v || v === 0) return '0.00 $';
        return v >= 1e9 ? (v/1e9).toFixed(2) + ' $B' : (v/1e6).toFixed(2) + ' $M';
    };

    async function load() {
        chart.showLoading({ color: '#BFA46F', textColor: '#121212' });
        try {
            const res = await fetch(apis[`${mode}-${view}`]);
            const json = await res.json();
            if (view === 'composition') renderTreemap(json.data);
            else if (view === 'growth') renderGrowth(json.data);
            else renderMap(json.data);
        } catch(e) { console.error(e); }
        chart.hideLoading();
    }

    function renderTreemap(data) {
        const sorted = data.sort((a,b) => b['Trade Value'] - a['Trade Value']).slice(0, 20);
        const total = sorted.reduce((sum, i) => sum + i['Trade Value'], 0);
        chart.setOption({
            color: OEC_COLORS,
            tooltip: { 
                trigger: 'item', backgroundColor: '#fff', 
                formatter: (p) => `<b style="color:#121212">${p.name}</b><br/><span style="color:#121212">${formatVal(p.value)}</span>` 
            },
            series: [{
                type: 'treemap', width: '100%', height: '100%', left: 0, top: 0,
                data: sorted.map(i => ({ name: i['HS4'], value: i['Trade Value'], percent: ((i['Trade Value']/total)*100).toFixed(1) + '%' })),
                label: { show: true, fontSize: 9, fontWeight: 'bold', color: '#121212', formatter: (p) => `${p.name}\n${p.data.percent}` },
                breadcrumb: { show: false }, itemStyle: { borderColor: '#fff', borderWidth: 1 }
            }]
        }, true);
    }

    function renderGrowth(data) {
        const years = [...new Set(data.map(d => d.Year))].sort();
        const top = [...new Set(data.filter(d => d.Year == 2024).sort((a,b) => b['Trade Value'] - a['Trade Value']).map(d => d['HS4']))].slice(0, 8);
        
        const series = top.map((p, idx) => ({
            name: p, type: 'line', stack: 'total', areaStyle: { opacity: 0.8 }, 
            symbol: 'none', color: OEC_COLORS[idx % OEC_COLORS.length],
            data: years.map(y => (data.find(d => d.Year == y && d['HS4'] == p) || { 'Trade Value': 0 })['Trade Value'])
        }));

        chart.setOption({
            tooltip: { 
                trigger: 'axis', backgroundColor: '#fff', textStyle: { color: '#121212' },
                formatter: (params) => {
                    // Используем axisPointer для определения точки наведения
                    const year = params[0].axisValue;
                    // Находим ту серию, на которую физически указывает курсор
                    const active = params.find(p => p.value > 0) || params[0];
                    return `<b>YEAR: ${year}</b><br/><span style="color:${active.color}">●</span> ${active.seriesName}: ${formatVal(active.value)}`;
                }
            },
            grid: { left: '2%', right: '4%', top: '8%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', boundaryGap: false, data: years },
            yAxis: { type: 'value', axisLabel: { show: false }, splitLine: { show: false } },
            series: series
        }, true);
    }

    async function renderMap(data) {
        const geoRes = await fetch('https://raw.githubusercontent.com/apache/echarts/master/test/data/map/json/world.json');
        const geoJson = await geoRes.json();
        echarts.registerMap('world', geoJson);
        const key = mode === 'export' ? 'Importer Country' : 'Exporter Country';

        chart.setOption({
            visualMap: { min: 0, max: 1e9, inRange: { color: ['#e0e0e0', '#BFA46F'] }, show: false },
            tooltip: { 
                trigger: 'item', backgroundColor: '#fff', textStyle: { color: '#121212' },
                formatter: (p) => p.data ? `<b style="color:#121212">${p.name}</b><br/><span style="color:#121212">${formatVal(p.value)}</span>` : `<b>${p.name}</b><br/>No Data`
            },
            geo: {
                map: 'world', roam: true, center: [65, 40], zoom: 5,
                itemStyle: { areaColor: '#f5f5f5', borderColor: '#dcdcdc' },
                emphasis: { itemStyle: { areaColor: '#ffcc00' }, label: { show: false } }
            },
            series: [{ type: 'map', geoIndex: 0, data: data.map(i => ({ name: i[key], value: i['Trade Value'] })) }]
        }, true);
    }

    function setMode(m) { mode = m; updateUI(); load(); }
    function setView(v) { view = v; updateUI(); load(); }
    function updateUI() {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`f-${mode}`).classList.add('active');
        document.getElementById(view === 'composition' ? 'v-composition' : (view === 'growth' ? 'v-growth' : 'v-map')).classList.add('active');
    }
    load();
</script>
</body>
</html>
