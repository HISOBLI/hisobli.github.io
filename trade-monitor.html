<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --bg: #121212; --panel: #171717; --accent: #BFA46F; --anthracite: #121212; }
        body { background: var(--bg); margin: 0; font-family: 'Fira Mono', monospace; color: var(--accent); overflow: hidden; }
        .tm-container {
            width: 540px; height: 380px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; background: var(--panel); margin-left: 145px;
        }
        .tm-header { background: var(--accent); color: var(--bg); padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        #canvas { flex: 1; width: 100%; background: #ffffff; }
        .tm-controls { padding: 8px; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--accent); background: var(--panel); }
        .btn-group { display: flex; gap: 4px; justify-content: center; }
        .btn { 
            background: transparent; border: 1px solid var(--accent); color: var(--accent); 
            padding: 4px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn.active { background: var(--accent); color: var(--bg); }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="tm-container">
    <div class="tm-header" id="tm-title">UZBEKISTAN TRADE DATA ENGINE</div>
    <div id="canvas"></div>
    <div class="tm-controls">
        <div class="btn-group">
            <button id="f-export" class="btn active" onclick="setMode('export')">ЭКСПОРТ</button>
            <button id="f-import" class="btn" onclick="setMode('import')">ИМПОРТ</button>
        </div>
        <div class="btn-group">
            <button id="v-map" class="btn" onclick="setView('map')">КАРТА</button>
            <button id="v-growth" class="btn" onclick="setView('growth')">РАЗВИТИЕ</button>
            <button id="v-composition" class="btn active" onclick="setView('composition')">СОСТАВ</button>
        </div>
    </div>
</div>

<script>
    const chart = echarts.init(document.getElementById('canvas'));
    let mode = 'export', view = 'composition';

    const OEC_COLORS = ['#ffcc00', '#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#e74c3c', '#1abc9c', '#34495e', '#d35400', '#7f8c8d'];

    const apis = {
        'export-composition': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2024%3BExporter%20Country%3Aasuzb',
        'import-composition': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2024%3BImporter%20Country%3Aasuzb',
        'export-growth': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2018%2C2019%2C2020%2C2021%2C2022%2C2023%2C2024%3BExporter%20Country%3Aasuzb',
        'import-growth': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CHS4&measures=Trade%20Value&parents=true&include=Year%3A2018%2C2019%2C2020%2C2021%2C2022%2C2023%2C2024%3BImporter%20Country%3Aasuzb',
        'export-map': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CImporter%20Country&measures=Trade%20Value&parents=true&properties=Importer%20Country%20ISO%203&include=Year%3A2024%3BExporter%20Country%3Aasuzb',
        'import-map': 'https://api-v2.oec.world/tesseract/data.jsonrecords?cube=trade_i_baci_a_17&drilldowns=Year%2CExporter%20Country&measures=Trade%20Value&parents=true&properties=Exporter%20Country%20ISO%203&include=Year%3A2024%3BImporter%20Country%3Aasuzb'
    };

    const formatVal = (v) => v >= 1e9 ? (v/1e9).toFixed(2) + ' $B' : (v/1e6).toFixed(2) + ' $M';

    async function load() {
        chart.showLoading({ color: '#BFA46F', textColor: '#121212' });
        try {
            const res = await fetch(apis[`${mode}-${view}`]);
            const json = await res.json();
            if (view === 'composition') renderTreemap(json.data);
            else if (view === 'growth') renderGrowth(json.data);
            else renderMap(json.data);
        } catch(e) { console.error("Data Error", e); }
        chart.hideLoading();
    }

    function renderTreemap(data) {
        const clean = data.sort((a,b) => b['Trade Value'] - a['Trade Value']).slice(0, 15);
        chart.setOption({
            color: OEC_COLORS,
            tooltip: { 
                trigger: 'item', 
                backgroundColor: '#fff', 
                formatter: (p) => `<b style="color:#121212">${p.name}</b><br/><span style="color:#121212">${formatVal(p.value)}</span>` 
            },
            series: [{
                type: 'treemap',
                data: clean.map(i => ({ name: i['HS4'], value: i['Trade Value'] })),
                label: { show: true, formatter: '{b}\n{d}%', color: '#121212', fontSize: 10, fontWeight: 'bold' },
                itemStyle: { borderColor: '#fff', borderWidth: 1 },
                breadcrumb: { show: false }
            }]
        }, true);
    }

    function renderGrowth(data) {
        const years = [...new Set(data.map(d => d.Year))].sort();
        const top = [...new Set(data.filter(d => d.Year == 2024).sort((a,b) => b['Trade Value'] - a['Trade Value']).map(d => d['HS4']))].slice(0, 6);
        
        const series = top.map((p, idx) => ({
            name: p, type: 'line', stack: 'total', areaStyle: { opacity: 0.8 }, 
            symbol: 'none', color: OEC_COLORS[idx % OEC_COLORS.length],
            data: years.map(y => (data.find(d => d.Year == y && d['HS4'] == p) || {})['Trade Value'] || 0)
        }));

        chart.setOption({
            tooltip: { 
                trigger: 'item', // Важно: показываем только тот слой, на который навели
                backgroundColor: '#fff', 
                formatter: (p) => `<b style="color:#121212">${p.seriesName}</b><br/><span style="color:#121212">${p.name}: ${formatVal(p.value)}</span>`
            },
            grid: { top: 20, bottom: 30, left: 50, right: 20 },
            xAxis: { type: 'category', data: years, axisLabel: { color: '#121212' } },
            yAxis: { type: 'value', axisLabel: { show: false }, splitLine: { show: false } },
            series: series
        }, true);
    }

    async function renderMap(data) {
        const geo = await (await fetch('https://raw.githubusercontent.com/apache/echarts/master/test/data/map/json/world.json')).json();
        echarts.registerMap('world', geo);
        const key = mode === 'export' ? 'Importer Country' : 'Exporter Country';
        
        chart.setOption({
            visualMap: { min: 0, max: 1e9, inRange: { color: ['#f0f0f0', '#BFA46F'] }, show: false },
            tooltip: { 
                trigger: 'item', 
                backgroundColor: '#fff',
                formatter: (p) => p.data ? `<b style="color:#121212">${p.name}</b><br/><span style="color:#121212">${formatVal(p.value)}</span>` : `<span style="color:#121212">${p.name}: No data</span>`
            },
            series: [{ 
                type: 'map', map: 'world', 
                itemStyle: { areaColor: '#f5f5f5', borderColor: '#ccc' },
                emphasis: { itemStyle: { areaColor: '#ffcc00' } },
                data: data.map(i => ({ name: i[key], value: i['Trade Value'] })) 
            }]
        }, true);
    }

    function setMode(m) { mode = m; updateUI(); load(); }
    function setView(v) { view = v; updateUI(); load(); }
    function updateUI() {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`f-${mode}`).classList.add('active');
        const vId = view === 'composition' ? 'v-composition' : (view === 'growth' ? 'v-growth' : 'v-map');
        document.getElementById(vId).classList.add('active');
    }

    load();
    window.onresize = () => chart.resize();
</script>
</body>
</html>
