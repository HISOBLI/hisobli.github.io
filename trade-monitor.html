<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root { --bg: #121212; --panel: #171717; --accent: #BFA46F; }
        body { background: var(--bg); margin: 0; font-family: 'Fira Mono', monospace; overflow: hidden; }
        .tm-container {
            width: 540px; height: 380px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; background: var(--panel); margin-left: 145px;
        }
        .tm-header {
            background: var(--panel); color: var(--accent); padding: 7px; text-align: center; font-weight: bold;
            text-transform: uppercase; font-size: 13px; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .tm-header .trade-symbol { height: 32px; width: auto; }
        #canvas { flex: 1; width: 100%; background: #ffffff; }
        .tm-controls {
            padding: 8px; display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            gap: 5px; border-top: 1px solid var(--accent); background: var(--panel); font-size: 9px; color: var(--accent);
        }
        .btn-group { display: flex; gap: 4px; justify-content: center; }
        .btn {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 4px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase;
        }
        .btn.active { background: var(--accent); color: var(--bg); }
        .powered { display: flex; align-items: center; gap: 6px; }
        .powered img { height: 20px; width: auto; }
        .hisobli { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .hisobli img { height: 20px; width: auto; }
    </style>
</head>
<body>
<div class="tm-container">
    <div class="tm-header" id="tm-title">
        <svg class="trade-symbol" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <!-- Полосы флага Узбекистана (полноцвет) -->
            <rect width="120" height="60" fill="#0099B5"/>
            <rect y="12" width="120" height="36" fill="#FFFFFF"/>
            <rect y="24" width="120" height="12" fill="#CE1126"/>
            <!-- Полумесяц и звёзды (стилизованно, но узнаваемо) -->
            <circle cx="30" cy="30" r="8" fill="#0099B5"/>
            <circle cx="30" cy="30" r="5" fill="#FFFFFF"/>
            <circle cx="30" cy="30" r="2.5" fill="#CE1126"/>
            <polygon points="30,22 32,26 36,26 33,28 34,32 30,30 26,32 27,28 24,26 28,26" fill="#FFFFFF"/>
            <!-- Символы экспорта/импорта: контейнер + стрелки -->
            <rect x="60" y="18" width="40" height="24" fill="#FFFFFF" stroke="#CE1126" stroke-width="1.5"/>
            <text x="80" y="34" font-size="10" fill="#0099B5" text-anchor="middle" font-weight="bold">TRADE</text>
            <path d="M50 30 L55 25 M55 35 L50 30 M70 30 L75 25 M75 35 L70 30" stroke="#CE1126" stroke-width="2" fill="none"/>
        </svg>
        UZBEKISTAN: EXPORT-IMPORT
    </div>
    <div id="canvas"></div>
    <div class="tm-controls">
        <div class="powered">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/The_Observatory_of_Economic_Complexity_logo.svg" alt="OEC Logo">
            POWERED BY The Observatory of Economic Complexity (OEC)
        </div>
        <div class="btn-group">
            <button id="f-export" class="btn active" onclick="setMode('export')">EXPORT</button>
            <button id="f-import" class="btn" onclick="setMode('import')">IMPORT</button>
        </div>
        <div class="btn-group">
            <button id="v-map" class="btn" onclick="setView('map')">MAP</button>
            <button id="v-growth" class="btn" onclick="setView('growth')">GROWTH</button>
            <button id="v-composition" class="btn active" onclick="setView('composition')">COMPOSITION</button>
        </div>
        <div class="hisobli">
            ESPECIALLY FOR A CONSULTING COMPANY "HISOBLI"
            <img src="logo.png" alt="HISOBLI Logo">
        </div>
    </div>
</div>
<script>
    // ... весь твой скрипт без изменений (renderGrowth, load и т.д.) ...
    // (вставь сюда свой текущий <script> блок полностью)
</script>
</body>
</html>
