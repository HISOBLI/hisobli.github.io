name: AI Code Health Check
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check_code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install NEW AI Library
        run: pip install -U google-genai # Ставим новую библиотеку, которую они просят
      - name: Run AI Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY1 }}
        run: |
          python -c "
          from google import genai
          import os

          # Инициализируем клиента по новому стандарту
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          
          files = ['dashbord2.html', 'stats.html']
          
          for file_name in files:
              if os.path.exists(file_name):
                  with open(file_name, 'r', encoding='utf-8') as f:
                      content = f.read()
                  print(f'--- ANALYZING: {file_name} ---')
                  try:
                      # Новый синтаксис вызова для Gemini 1.5/3 через актуальный клиент
                      response = client.models.generate_content(
                          model='gemini-1.5-flash', 
                          contents=f'Check this HTML for errors and PCB style compliance: {content}'
                      )
                      print(response.text)
                  except Exception as e:
                      print(f'AI Error: {e}')
              else:
                  print(f'File {file_name} not found.')
          "
