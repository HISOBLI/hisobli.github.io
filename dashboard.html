<!DOCTYPE html>

<meta charset="UTF-8">

<title>HISOBLI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f0f10;
color:white;
font-family:'Inter',sans-serif;
}

/* ШАПКА */

.header{
position:sticky;
top:0;
background:#0f0f10;
border-bottom:1px solid #2a2a2a;
text-align:center;
padding:6px 10px;
}

.header-row1{
display:flex;
justify-content:center;
align-items:center;
gap:16px;
font-size:14px;
}

.logo img{
height:48px;
}

.header-row2{
font-size:13px;
margin-top:2px;
}

.lang{
position:absolute;
right:18px;
top:10px;
font-size:14px;
cursor:pointer;
}

/* ТИКЕР */

.ticker{
border-bottom:1px solid #222;
}

/* ПАНЕЛЬ КАНАЛОВ */

.channels{
display:flex;
justify-content:center;
align-items:flex-start;
gap:120px;
padding:24px 20px;
}

.block-title{
font-size:14px;
letter-spacing:1px;
text-align:center;
margin-bottom:12px;
}

.row{
display:flex;
gap:20px;
}

/* КНОПКИ */

.icon{
width:56px;
height:56px;
border-radius:50%;
background:linear-gradient(#2b2b2b,#171717);
display:flex;
align-items:center;
justify-content:center;
position:relative;
cursor:pointer;
transition:0.2s;
}

.icon:hover{
transform:scale(1.05);
}

/* ОРБИТЫ */

.icon::before{
content:"";
position:absolute;
width:78px;
height:78px;
border-radius:50%;
border:2px solid rgba(212,175,55,0.55);
animation:spin 8s linear infinite;
}

.icon::after{
content:"";
position:absolute;
width:64px;
height:64px;
border-radius:50%;
border:2px dashed rgba(212,175,55,0.35);
animation:spin 12s linear reverse infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* SVG */

.icon svg{
width:24px;
height:24px;
fill:white;
}

.icon:hover svg{
fill:#d4af37;
}

/* КОНТАКТЫ */

.contact{
text-align:center;
max-width:280px;
}

.contact-title{
font-size:13px;
margin-bottom:12px;
}

.contact-sub{
font-size:11px;
color:#9a9a9a;
margin-top:10px;
}

/* ФУТЕР */

.footer{
border-top:1px solid #2a2a2a;
text-align:center;
font-size:11px;
color:#888;
padding:10px;
}

</style>
</head>
