<script>
const SUPABASE_URL = "https://ivqrnsoxoacxyzahoqld.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cXJuc294b2FjeHl6YWhvcWxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTA3NTIsImV4cCI6MjA4OTQ2Njc1Mn0.OBONo_RG8dmfsc5PymfLhEjC5kcqqPzMVHRYSnDmy7s";

const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);

const charts = {}; // хранилище для повторного использования Chart.js

let myFp = localStorage.getItem('myAnalyticsFp') || (localStorage.setItem('myAnalyticsFp', btoa(navigator.userAgent + navigator.language + screen.width + screen.height + Intl.DateTimeFormat().resolvedOptions().timeZone).slice(0,16)), localStorage.getItem('myAnalyticsFp'));
document.getElementById('myFp').textContent = myFp;

sb.channel('changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'analytics' }, (p) => {
  const ev = p.new;
  if (ev.tz && (ev.tz.includes('Tashkent') || ev.tz.includes('Asia'))) {
    const t = document.getElementById('realtime-toast');
    t.textContent = `Новый визит из Узбекистана! (${ev.lang || 'неизв.'})`;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 5000);
  }
  allData.unshift(ev);
  renderAll();
}).subscribe();

let allData = [];
async function loadData() {
  try {
    const { data, error } = await sb.from('analytics').select('*').order('time', { ascending: false }).limit(3000);
    if (error) throw error;
    allData = data || [];
    renderAll();
  } catch (err) {
    console.error("Ошибка загрузки данных:", err.message);
  }
}

function renderChart(id, config) {
  if (charts[id]) {
    charts[id].data = config.data;
    charts[id].update();
  } else {
    charts[id] = new Chart(document.getElementById(id), config);
  }
}

function renderAll() {
  // Объявляем переменные ОДИН раз
  let visits = {};
  let langs = {};
  let devices = {};
  let countries = {};
  let hours = Array(24).fill(0);
  let clicks = {};
  let ru = 0, uz = 0;
  let products = {};
  let durations = [];
  let referrers = {};
  let uniqueFp = {};

  // Заполняем данные
  allData.forEach(d => {
    if (d.type === 'visit') {
      const day = d.time.split('T')[0];
      visits[day] = (visits[day] || 0) + 1;
    }
    if (d.lang) langs[d.lang] = (langs[d.lang] || 0) + 1;
    if (d.screen) devices[d.screen] = (devices[d.screen] || 0) + 1;
    const c = d.tz?.includes('Tashkent') ? 'Узбекистан' : (d.tz?.split('/')[0] || 'Другое');
    countries[c] = (countries[c] || 0) + 1;
    if (d.time) hours[new Date(d.time).getHours()]++;
    if (d.type === 'click' && d.label) clicks[d.label] = (clicks[d.label] || 0) + 1;
    if (d.lang?.startsWith('ru')) ru++;
    if (d.lang?.startsWith('uz')) uz++;
    if (d.label && d.label.includes('BUYURI')) products[d.label] = (products[d.label] || 0) + 1;
    if (d.type === 'session_end' && d.duration) durations.push(parseInt(d.duration) || 0);
    let r = 'Прямой';
    try { if (d.referrer) r = new URL(d.referrer).hostname; } catch {}
    referrers[r] = (referrers[r] || 0) + 1;
    if (d.time) {
      const day = d.time.split('T')[0];
      if (!uniqueFp[day]) uniqueFp[day] = new Set();
      uniqueFp[day].add(d.fp);
    }
  });

  // Рендерим графики
  renderChart('visitsChart', { type:'line', data:{ labels:Object.keys(visits).sort(), datasets:[{label:'Визиты', data:Object.values(visits), borderColor:'#BFA46F'}] } });
  renderChart('langChart', { type:'pie', data:{ labels:Object.keys(langs), datasets:[{data:Object.values(langs), backgroundColor:['#BFA46F','#a08050','#d0d0d0']}] } });
  renderChart('deviceChart', { type:'bar', data:{ labels:Object.keys(devices), datasets:[{label:'Экраны', data:Object.values(devices), backgroundColor:'#BFA46F'}] } });
  renderChart('geoChart', { type:'bar', data:{ labels:Object.keys(countries), datasets:[{label:'Страны', data:Object.values(countries), backgroundColor:'#BFA46F'}] } });
  renderChart('heatmapChart', { type:'bar', data:{ labels:Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')+':00'), datasets:[{label:'По часам', data:hours, backgroundColor:'#BFA46F'}] } });

  const topC = Object.entries(clicks).sort((a,b)=>b[1]-a[1]).slice(0,8);
  renderChart('topClicksChart', { type:'bar', data:{ labels:topC.map(x=>x[0].slice(0,18)), datasets:[{label:'Топ кликов', data:topC.map(x=>x[1]), backgroundColor:'#BFA46F'}] } });

  renderChart('ruUzChart', { type:'pie', data:{ labels:['RU','UZ'], datasets:[{data:[ru,uz], backgroundColor:['#BFA46F','#a08050']}] } });

  renderChart('productsChart', { type:'bar', data:{ labels:Object.keys(products), datasets:[{label:'Продукты', data:Object.values(products), backgroundColor:'#BFA46F'}] } });

  const avg = durations.length ? (durations.reduce((a,b)=>a+b,0)/durations.length).toFixed(1) : 0;
  renderChart('sessionDurationChart', { type:'bar', data:{ labels:['Средняя сессия'], datasets:[{label:'секунды', data:[avg], backgroundColor:'#BFA46F'}] } });

  renderChart('referrerChart', { type:'pie', data:{ labels:Object.keys(referrers), datasets:[{data:Object.values(referrers), backgroundColor:['#BFA46F','#a08050','#d0d0d0']}] } });

  renderChart('uniqueFpChart', { type:'line', data:{ labels:Object.keys(uniqueFp).sort(), datasets:[{label:'Новые fp', data:Object.values(uniqueFp).map(s=>s.size), borderColor:'#BFA46F'}] } });

  // Таблица
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = '';
  allData.slice(0,150).forEach(item => {
    const tr = document.createElement('tr');
    if (item.fp === myFp) tr.classList.add('me');
    tr.innerHTML = `<td>${new Date(item.time).toLocaleString('ru-RU')}</td><td>${item.type}</td><td>${item.url?.split('/').pop()||item.label||'-'}</td><td>${item.fp} ${item.fp===myFp?'(Я — Хамза)':''}</td><td>${JSON.stringify(item).slice(0,80)}...</td>`;
    tbody.appendChild(tr);
  });

  // Конверсия
  let v = 0, c = 0, p = 0;
  allData.forEach(d => {
    if (d.type === 'visit') v++;
    if (d.type === 'click') c++;
    if (d.label?.includes('BUYURI')) p++;
  });
  const ctr = v ? ((c / v) * 100).toFixed(1) : 0;
  const prodRate = c ? ((p / c) * 100).toFixed(1) : 0;
  document.getElementById('stats').innerHTML = `Визиты: ${v} | CTR: ${ctr}% | Продукты: ${prodRate}%`;

  // Топ активные
  const map = {};
  allData.forEach(d => { map[d.fp] = (map[d.fp] || 0) + 1; });
  const top = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('topUsers').innerHTML = 'Топ активные:<br>' + top.map(([fp,c]) => `${fp.slice(0,8)}... — ${c}`).join('<br>');

  // Онлайн
  const now = Date.now();
  const online = new Set();
  allData.forEach(d => {
    if (d.time && now - new Date(d.time).getTime() < 120000) online.add(d.fp);
  });
  document.getElementById('onlineUsers').innerHTML = `Сейчас онлайн: ${online.size}`;
}

async function archiveOld() {
  if (!confirm('Удалить старше 30 дней?')) return;
  const { error } = await sb.from('analytics').delete().lt('time', new Date(Date.now()-30*86400000).toISOString());
  if (error) console.error(error);
  loadData();
}

async function exportCSV() {
  const { data, error } = await sb.from('analytics').select('*');
  if (error) return console.error(error);
  let csv = "Время,Тип,Страница,FP\n";
  data.forEach(d => csv += `"${d.time}","${d.type}","${d.url||d.label}","${d.fp}"\n`);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'hisobli-analytics.csv';
  a.click();
}

window.addEventListener("scroll", () => document.getElementById("header").classList.toggle("scrolled", window.scrollY > 80));
loadData();
</script>
